[config.site]
title = "Portfólio"
description = "Meu Portfólio Navegável"
pageTitle = "Ingrid Moreno | Portfólio"
pageDescription = "“Um portfólio pessoal para compartilhar ideias, projetos e trajetórias em construção."
repository = "https://github.com/IngridMoreno12/IngridMoreno12.github.io"
footerNote = "Feito para contar uma história, uma etapa de cada vez."

[config.vibe]
showTrail = true

[config.theme]
palette = "green-soft"

[config.comments]
enabled = true
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "preferred_color_scheme"
lang = "pt"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "pt"
dark = "html.dark"
pageview = true
comment = true

