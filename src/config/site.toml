[config.site]
title = "navfolio"
description = "A personal navigation portfolio starter built with Astro."
pageTitle = "navfolio | Digital Publication Space"
pageDescription = "A calm AI-native personal publication space for notes, links, and writing."
repository = "https://github.com/dodolalorc/astro-navfolio"
footerNote = "Released as an open-source starter."

[config.vibe]
showTrail = true

[config.theme]
# Available palettes:
# green-soft, green-vivid, rose-soft, pink-soft, purple-soft, blue-soft, orange-soft, brown-soft
palette = "green-soft"

[config.comments]
enabled = true
provider = "giscus"
show_on_posts = true

[config.search]
enabled = true
shortcut = "mod+k"
placeholder = "Search notes..."
maxResults = 6

[config.blog]
postsPerPage = 6

[config.comments.giscus]
repo = "dodolalorc/astro-navfolio"
repo_id = "R_kgDOSaQejw"
category = "Announcements"
category_id = "DIC_kwDOSaQej84C9di9"
mapping = "pathname"
strict = "0"
reactions_enabled = "1"
emit_metadata = "0"
input_position = "top"
theme = "preferred_color_scheme"
lang = "zh-CN"
loading = "lazy"

[config.comments.utterances]
repo = ""
issue_term = "pathname"
label = "comment"
theme = "github-light"

[config.comments.waline]
server_url = ""
lang = "zh-CN"
dark = "html.dark"
pageview = true
comment = true

[config.profile]
name = "Ingrid Moreno"
handle = "@ingridmoreno12"
role = "Data Analyst | Analytics & Dataviz"
company = "Itaú"
location = "São Paulo, Brazil"
email = "hello@navfolio.site"
website = "https://astro.navfolio.site/"
github = "https://github.com/navfolio"
meta = "Open-source maintainer"
avatar = "/images/logo.png"

[[config.topNav.links]]
label = "Home"
href = "/"

[[config.topNav.links]]
label = "Skills"
href = "/blog"

[[config.topNav.links]]
label = "Projects"
href = "/projects"

[[config.topNav.links]]
label = "Trajetória"
href = "/vibe"

[[config.topNav.links]]
label = "About"
href = "/about"

[config.home]
layout = "grid"

[config.home.quote]
text = [
  "Curious by nature,",
  "Passionate about solving problems,",
  "and always learning something new along the way."
]
image = "/images/logo-with-name.png"

[config.i18n.pt.quote]
text = [
  "Curiosa por natureza,",
  "Apaixonada por resolver problemas,",
  "e sempre aprendendo algo novo pelo caminho."
]

[config.home.intro]
title = "Welcome,"
name = " come in"
body = [
  "I've always loved movies, games, and good stories, I think part of the magic has always been discovering what lies beyond the next page.",
  "Today I work with data and analytics, looking for answers in data (or the right questions).",
  "Here I share my projects, learnings, and pieces of this journey."
]
image = "/images/logo-cat.png"

[config.i18n.pt.intro]
title = "Oie,"
name = " seja bem-vind@"
body = [
  "Sempre gostei de filmes, jogos e boas histórias, acho que parte da graça sempre esteve em descobrir o que existe logo depois da próxima página.",
  "Hoje trabalho com dados e analytics, procurando respostas nos dados (ou as perguntas certas).",
  "Aqui compartilho os meus projetos, aprendizados e partes dessa jornada."
]


[config.home.latest]
count = 1
heatmapWeeks = 24
showHeatmapLatest = true
excludeDraft = true
startDate = ""
dateArchiveBaseHref = ""

[[config.home.navigation]]
icon = "compass"
